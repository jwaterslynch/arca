name: Build macOS Release (Tauri)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to build (defaults to package.json version, e.g. v0.1.0-beta.4)"
        required: false
        type: string
      release_name:
        description: "Release title override"
        required: false
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: false
        type: boolean
        default: true
      draft:
        description: "Create as draft release"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-macos-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          pkg_version=$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag_name }}" ]; then
            tag_name="${{ inputs.tag_name }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ] && [ -n "${GITHUB_REF_NAME}" ]; then
            tag_name="${GITHUB_REF_NAME}"
          else
            tag_name="v${pkg_version}"
          fi

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${{ inputs.release_name }}" ]; then
            release_name="${{ inputs.release_name }}"
          else
            release_name="Arca ${tag_name}"
          fi

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            prerelease="${{ inputs.prerelease }}"
            draft="${{ inputs.draft }}"
          else
            prerelease="true"
            draft="true"
          fi

          # Detect whether ALL Apple signing secrets are available
          if [ -n "${{ secrets.APPLE_CERTIFICATE }}" ] && \
             [ -n "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" ] && \
             [ -n "${{ secrets.APPLE_SIGNING_IDENTITY }}" ] && \
             [ -n "${{ secrets.APPLE_ID }}" ] && \
             [ -n "${{ secrets.APPLE_PASSWORD }}" ] && \
             [ -n "${{ secrets.APPLE_TEAM_ID }}" ]; then
            signing_enabled="true"
          else
            signing_enabled="false"
          fi

          cat <<EOF >> "$GITHUB_OUTPUT"
          tag_name=${tag_name}
          release_name=${release_name}
          prerelease=${prerelease}
          draft=${draft}
          signing_enabled=${signing_enabled}
          EOF

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS dependencies
        run: npm ci

      - name: Build + publish macOS artifacts (signed + notarized)
        if: steps.meta.outputs.signing_enabled == 'true'
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ steps.meta.outputs.tag_name }}
          releaseName: ${{ steps.meta.outputs.release_name }}
          releaseBody: |
            Signed + notarized build for ${{ steps.meta.outputs.tag_name }}.

            This build is codesigned and notarized with Apple.
            It should install and open without Gatekeeper warnings.

            See:
            - RELEASE_CHECKLIST.md
          releaseDraft: ${{ steps.meta.outputs.draft == 'true' }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}

      - name: Build + publish macOS artifacts (unsigned fallback)
        if: steps.meta.outputs.signing_enabled != 'true'
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.meta.outputs.tag_name }}
          releaseName: ${{ steps.meta.outputs.release_name }}
          releaseBody: |
            ⚠️ UNSIGNED alpha build for ${{ steps.meta.outputs.tag_name }}.

            This build is NOT codesigned or notarized.
            macOS will block it by default. Testers must:
            1. Open System Settings → Privacy & Security → click "Open Anyway"
            2. Or run: xattr -dr com.apple.quarantine "/Applications/Arca.app"

            See:
            - PRIVATE_ALPHA_DISTRIBUTION.md
            - RELEASE_CHECKLIST.md
          releaseDraft: ${{ steps.meta.outputs.draft == 'true' }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
