<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Arca v3 — Execute redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink:        #0f1822;
    --ink-2:      #1a2532;
    --paper:      #f4efe6;
    --paper-2:    #ebe4d6;
    --surface:    #fdfbf6;
    --surface-2:  #f7f1e5;
    --line:       rgba(15,24,34,0.10);
    --line-2:     rgba(15,24,34,0.06);
    --text:       #1a2532;
    --text-2:     #5b6573;
    --text-3:     #8a8d92;

    --accent:        #b07a3e;
    --accent-2:      #c9956b;
    --accent-deep:   #8a5a2a;
    --accent-soft:   rgba(176,122,62,0.12);
    --accent-glow:   rgba(176,122,62,0.22);

    --d-execute: #2f4a5c;
    --d-health:  #5a6b3a;
    --d-wealth:  #8a5a2a;
    --d-wise:    #4a3a5c;

    --danger:    #a94032;
    --warn:      #b07a3e;
    --ok:        #4a6b3a;
  }

  html, body { margin:0; padding:0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: var(--text);
    background: #f0eee9;
  }

  .display { font-family: 'Fraunces', Georgia, serif; font-weight: 500; letter-spacing: -0.02em; }
  .mono    { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  .ab { box-sizing: border-box; }
  .ab, .ab * { box-sizing: border-box; }

  @keyframes focusFadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes sessionFade {
    0%   { opacity: 0; }
    14%  { opacity: 1; }
    78%  { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes markDrawIn {
    0%   { opacity: 0; transform: scale(0.94); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes metaFadeIn {
    0%   { opacity: 0; transform: translateY(4px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulseSubtle {
    0%, 100% { opacity: 0.6; }
    50%      { opacity: 1; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
