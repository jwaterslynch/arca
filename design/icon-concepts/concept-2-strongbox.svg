<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923"/>
      <stop offset="100%" style="stop-color:#1a2634"/>
    </linearGradient>
    <linearGradient id="chest" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c9956b"/>
      <stop offset="100%" style="stop-color:#a07850"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg2)"/>
  <g transform="translate(256,260)">
    <!-- Chest body -->
    <rect x="-110" y="-40" width="220" height="130" rx="8" fill="none" stroke="#c9956b" stroke-width="6"/>
    <!-- Chest lid (arched top) -->
    <path d="M-110,-40 L-110,-70 Q-110,-110 -60,-110 L60,-110 Q110,-110 110,-70 L110,-40"
          fill="none" stroke="#c9956b" stroke-width="6" stroke-linejoin="round"/>
    <!-- Lid seam line -->
    <line x1="-110" y1="-40" x2="110" y2="-40" stroke="#c9956b" stroke-width="3" opacity="0.5"/>
    <!-- Keyhole -->
    <circle cx="0" cy="20" r="14" fill="none" stroke="#e8e0d4" stroke-width="4"/>
    <rect x="-4" y="30" width="8" height="22" rx="2" fill="#e8e0d4"/>
    <!-- Corner reinforcements -->
    <rect x="-112" y="-42" width="24" height="24" rx="3" fill="none" stroke="#c9956b" stroke-width="2" opacity="0.4"/>
    <rect x="88" y="-42" width="24" height="24" rx="3" fill="none" stroke="#c9956b" stroke-width="2" opacity="0.4"/>
    <rect x="-112" y="64" width="24" height="24" rx="3" fill="none" stroke="#c9956b" stroke-width="2" opacity="0.4"/>
    <rect x="88" y="64" width="24" height="24" rx="3" fill="none" stroke="#c9956b" stroke-width="2" opacity="0.4"/>
    <!-- Clasp at top center -->
    <rect x="-16" y="-118" width="32" height="14" rx="4" fill="#c9956b" opacity="0.6"/>
  </g>
</svg>