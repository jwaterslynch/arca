<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <!-- Background: rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg1)"/>
  <!-- A lettermark: geometric, angular -->
  <g transform="translate(256,270)">
    <!-- Main A shape -->
    <polygon points="0,-155 -105,140 -65,140 -38,62 38,62 65,140 105,140"
             fill="none" stroke="#e8e0d4" stroke-width="8" stroke-linejoin="round"/>
    <!-- Crossbar -->
    <line x1="-52" y1="30" x2="52" y2="30" stroke="#e8e0d4" stroke-width="8" stroke-linecap="round"/>
    <!-- Accent dot at apex -->
    <circle cx="0" cy="-155" r="6" fill="#c9956b"/>
    <!-- Subtle inner glow line -->
    <line x1="0" y1="-140" x2="-85" y2="130" stroke="#c9956b" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="-140" x2="85" y2="130" stroke="#c9956b" stroke-width="1.5" opacity="0.3"/>
  </g>
</svg>